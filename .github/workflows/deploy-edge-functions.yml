name: Deploy Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        function:
          - generate-shopify-app
          - shopify-oauth
          - generate-web-app
          - generate-app-preview
          - regenerate-file
          - evaluate-quality
          - create-checkout-session
          - create-portal-session
          - stripe-webhook
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy ${{ matrix.function }}
        run: |
          supabase functions deploy ${{ matrix.function }} \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
